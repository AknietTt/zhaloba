server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;
    charset utf-8;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1024;

    # /complaints — если браузер (html accept) → React SPA
    #             — если JS fetch (api call) → бэкенд
    location /complaints {
        if ($http_accept ~* "text/html") {
            rewrite ^ /index.html last;
        }
        proxy_pass         http://backend:8000;
        proxy_set_header   Host            $host;
        proxy_set_header   X-Real-IP       $remote_addr;
        proxy_read_timeout 60s;
    }

    # Чистые API маршруты — всегда на бэкенд
    # ^~ означает: если совпало — не проверять regex-блоки ниже
    location ^~ /uploads {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
    }

    location /stats/drivers {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
    }

    location /admin {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
    }

    location /login {
        if ($http_accept ~* "text/html") {
            rewrite ^ /index.html last;
        }
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
    }

    location /chat {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
    }

    location /api {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
    }

    # React SPA — всё остальное (включая /stats, /login React-роуты)
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }

    # Кэш статики
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
}
